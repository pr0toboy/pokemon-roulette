<h1 class="title">
  {{ 'game.main.roulette.postgame.title' | translate }}
  @if (currentFloor > 1) {
    <span class="floor-tag">{{ 'game.main.roulette.tower.floor' | translate }} {{ currentFloor }}</span>
  }
</h1>
<p class="respin-reason">{{ respinReason | translate}}</p>
<app-wheel  #wheel
            [items]="actions"
            (selectedItemEvent)="onItemSelected($event)">
</app-wheel>
